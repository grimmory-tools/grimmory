# Caffeine JCache configuration for Hibernate Second-Level Cache
# This file defines the default and per-region settings to prevent unbounded memory growth.

caffeine.jcache {

  # Default settings for all cache regions not explicitly defined below
  default {
    policy {
      maximum.size = 1000
      expire-after-write = 10m
    }
  }

  org.booklore.model.entity {
    AppSettingEntity {
      policy {
        maximum.size = 100
        expire-after-access = 24h
      }
    }
    AppSettingEntity_NaturalId {
      policy {
        maximum.size = 100
        expire-after-access = 24h
      }
    }
    UserPermissionsEntity {
      policy {
        maximum.size = 500
        expire-after-write = 30m
      }
    }
    TagEntity {
      policy {
        maximum.size = 2000
        expire-after-write = 6h
      }
      bookMetadataEntityList {
        policy {
          maximum.size = 1000
          expire-after-write = 10m
        }
      }
    }
    TagEntity_NaturalId {
      policy {
        maximum.size = 2000
        expire-after-write = 6h
      }
    }
    AuthorEntity {
      policy {
        maximum.size = 5000
        expire-after-write = 12h
      }
      bookMetadataEntityList {
        policy {
          maximum.size = 2000
          expire-after-write = 10m
        }
      }
    }
    AuthorEntity_NaturalId {
      policy {
        maximum.size = 5000
        expire-after-write = 12h
      }
    }
    CategoryEntity {
      policy {
        maximum.size = 500
        expire-after-write = 6h
      }
      bookMetadataEntityList {
        policy {
          maximum.size = 500
          expire-after-write = 10m
        }
      }
    }
    CategoryEntity_NaturalId {
      policy {
        maximum.size = 500
        expire-after-write = 6h
      }
    }
    MoodEntity {
      policy {
        maximum.size = 500
        expire-after-write = 6h
      }
      bookMetadataEntityList {
        policy {
          maximum.size = 500
          expire-after-write = 10m
        }
      }
    }
    MoodEntity_NaturalId {
      policy {
        maximum.size = 500
        expire-after-write = 6h
      }
    }
    BookEntity {
      policy {
        maximum.size = 5000
        expire-after-write = 10m
      }
    }
    BookMetadataEntity {
      policy {
        maximum.size = 5000
        expire-after-write = 10m
      }
      authors {
        policy {
          maximum.size = 5000
          expire-after-write = 10m
        }
      }
      categories {
        policy {
          maximum.size = 5000
          expire-after-write = 10m
        }
      }
      moods {
        policy {
          maximum.size = 5000
          expire-after-write = 10m
        }
      }
      tags {
        policy {
          maximum.size = 5000
          expire-after-write = 10m
        }
      }
      reviews {
        policy {
          maximum.size = 1000
          expire-after-write = 10m
        }
      }
    }
    LibraryEntity {
      policy {
        maximum.size = 100
        expire-after-write = 1h
      }
      libraryPaths {
        policy {
          maximum.size = 100
          expire-after-write = 1h
        }
      }
    }
    LibraryPathEntity {
      policy {
        maximum.size = 500
        expire-after-write = 1h
      }
    }
    CustomFontEntity {
      policy {
        maximum.size = 100
        expire-after-write = 12h
      }
    }
  }

  default-query-results-region {
    policy {
      maximum.size = 1000
      expire-after-write = 5m
    }
  }

  default-update-timestamps-region {
  }
}
