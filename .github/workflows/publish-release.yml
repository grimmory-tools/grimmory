name: Release - Build, Tag, and Publish

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to release from'
        required: false
        default: main
        type: string
      bump:
        description: 'Semver bump to apply'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  resolve_ref:
    name: Resolve Release Ref
    runs-on: ubuntu-latest

    outputs:
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Confirm Release Ref Is On Main
        run: |
          git fetch origin main --tags --force
          if ! git branch -r --contains HEAD | grep -q 'origin/main'; then
            echo "Selected ref is not contained by origin/main"
            exit 1
          fi

      - name: Record Resolved Commit
        id: resolve
        run: |
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  test-suite:
    name: Test Suite
    needs: [resolve_ref]
    uses: ./.github/workflows/test-suite.yml
    with:
      checkout_ref: ${{ needs.resolve_ref.outputs.commit_sha }}

  build-and-release:
    name: Build, Tag, and Release
    needs: [resolve_ref, test-suite]
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      pull-requests: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve_ref.outputs.commit_sha }}

      - name: Retrieve Latest Release Tag
        run: |
          git fetch --tags --force
          latest_tag=$(git tag --list "v*" --sort=-v:refname | head -n 1)
          latest_tag=${latest_tag:-"v0.0.0"}
          echo "latest_tag=$latest_tag" >> "$GITHUB_ENV"
          echo "Latest release tag: $latest_tag"

      - name: Determine Version Bump
        run: |
          semver=$(echo "${{ env.latest_tag }}" | sed 's/^v//')
          major=$(echo "$semver" | cut -d. -f1)
          minor=$(echo "$semver" | cut -d. -f2)
          patch=$(echo "$semver" | cut -d. -f3)

          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          next_version="v${major}.${minor}.${patch}"
          if git rev-parse -q --verify "refs/tags/${next_version}" >/dev/null; then
            echo "Tag ${next_version} already exists"
            exit 1
          fi

          echo "new_tag=$next_version" >> "$GITHUB_ENV"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "Next release tag: $next_version"

      - name: Set Up QEMU for Multi-Arch Builds
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Authenticate to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            grimmory/grimmory:${{ env.new_tag }}
            grimmory/grimmory:latest
            ghcr.io/grimmory-tools/grimmory:${{ env.new_tag }}
            ghcr.io/grimmory-tools/grimmory:latest
          build-args: |
            APP_VERSION=${{ env.new_tag }}
            APP_REVISION=${{ env.commit_sha }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/grimmory-tools/grimmory:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/grimmory-tools/grimmory:buildcache,mode=max

      - name: Create Release Tag
        run: |
          git tag -a "${{ env.new_tag }}" -m "Release ${{ env.new_tag }}"
          git push origin "${{ env.new_tag }}"

      - name: Update GitHub Release Draft
        uses: release-drafter/release-drafter@6db134d15f3909ccc9eefd369f02bd1e9cffdf97 # v6
        with:
          tag: ${{ env.new_tag }}
          name: "Release ${{ env.new_tag }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ env.new_tag }}" --draft=false
