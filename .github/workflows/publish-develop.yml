name: Develop - Build and Publish Test Image

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: publish-develop
  cancel-in-progress: true

jobs:
  test-suite:
    name: Test Suite
    uses: ./.github/workflows/test-suite.yml
    permissions:
      contents: read
      checks: write
    with:
      checkout_ref: ${{ github.event_name == 'push' && github.sha || 'develop' }}
      publish_test_results: false
      save_gradle_cache: true

  build-and-push:
    name: Build and Push Test Image
    needs: [test-suite]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          ref: ${{ github.event_name == 'push' && github.sha || 'develop' }}

      - name: Compute Image Tags
        id: tags
        run: |
          set -eu
          short_sha="$(git rev-parse --short=7 HEAD)"
          build_date="$(date -u +%Y%m%d)"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "version_tag=develop-${build_date}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set Up QEMU for Multi-Arch Builds
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          cache-image: false

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and Push Test Image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:develop
            ghcr.io/${{ github.repository }}:${{ steps.tags.outputs.version_tag }}
          build-args: |
            APP_VERSION=${{ steps.tags.outputs.version_tag }}
            APP_REVISION=${{ steps.tags.outputs.commit_sha }}
          cache-from: |
            type=gha,scope=image-shared
            type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: |
            type=gha,scope=image-shared,mode=max

      - name: Write Workflow Summary
        env:
          VERSION_TAG: ${{ steps.tags.outputs.version_tag }}
        run: |
          {
            echo "## Develop image published"
            echo
            echo "- \`ghcr.io/${{ github.repository }}:develop\`"
            echo "- \`ghcr.io/${{ github.repository }}:${VERSION_TAG}\`"
            echo "- Platforms: \`linux/amd64,linux/arm64\`"
          } >> "$GITHUB_STEP_SUMMARY"

  export-openapi:
    name: Export OpenAPI Artifact
    needs: [test-suite]
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          ref: ${{ github.event_name == 'push' && github.sha || 'develop' }}

      - name: Export OpenAPI JSON
        uses: ./.github/actions/export-openapi
        with:
          checkout_ref: ${{ github.event_name == 'push' && github.sha || 'develop' }}
          app_version: develop

      - name: Upload OpenAPI Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openapi-develop
          path: backend/build/openapi/grimmory-openapi.json
          retention-days: 30
