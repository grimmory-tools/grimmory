name: Angular Lint Threshold

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  lint-threshold:
    name: Frontend Lint Threshold Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      LINT_THRESHOLD: 713

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set Up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: booklore-ui/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./booklore-ui
        run: npm ci

      - name: Run Angular Lint
        working-directory: ./booklore-ui
        run: |
          # Lint output is written to JSON for threshold evaluation.
          npx ng lint --format json --output-file lint-results.json || true

      - name: Enforce Lint Problem Threshold
        working-directory: ./booklore-ui
        run: |
          if [ ! -f lint-results.json ]; then
            echo "ERROR: lint-results.json was not generated by ng lint"
            exit 1
          fi

          PROBLEM_COUNT=$(node -e "const fs=require('fs');const report=JSON.parse(fs.readFileSync('lint-results.json','utf8'));const total=(Array.isArray(report)?report:[]).reduce((sum,file)=>sum+Number(file.errorCount||0)+Number(file.warningCount||0),0);process.stdout.write(String(total));")

          echo "Lint problems found: ${PROBLEM_COUNT}"
          echo "Allowed threshold: ${LINT_THRESHOLD}"

          if [ "${PROBLEM_COUNT}" -gt "${LINT_THRESHOLD}" ]; then
            echo "ERROR: Lint problem threshold exceeded (${PROBLEM_COUNT} > ${LINT_THRESHOLD})"
            exit 1
          fi

          echo "OK: Lint problem count is within threshold (${PROBLEM_COUNT} <= ${LINT_THRESHOLD})"