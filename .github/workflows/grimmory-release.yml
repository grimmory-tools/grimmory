name: Grimmory - Release

on:
  push:
    tags:
      - 'v*-grimmory'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v3.2.1-grimmory)'
        required: true
        type: string

concurrency:
  group: grimmory-release
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build, Publish, and Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Determine Release Tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: main

      - name: Set Up QEMU for Multi-Arch Builds
        uses: docker/setup-qemu-action@v3
        with:
          cache-image: false

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.release_tag }}
          build-args: |
            APP_VERSION=${{ steps.tag.outputs.release_tag }}
            APP_REVISION=${{ github.sha }}
          cache-from: |
            type=gha,scope=image-shared
            type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: |
            type=gha,scope=image-shared,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: ${{ github.event_name == 'push' }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Grimmory ${{ steps.tag.outputs.release_tag }}
          generate_release_notes: true

      - name: Write Workflow Summary
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.release_tag }}
        run: |
          {
            echo "## Grimmory Release Published"
            echo
            echo "- **Tag**: \`${RELEASE_TAG}\`"
            echo "- **Images**:"
            echo "  - \`ghcr.io/${{ github.repository }}:latest\`"
            echo "  - \`ghcr.io/${{ github.repository }}:${RELEASE_TAG}\`"
            echo "- **Platforms**: \`linux/amd64,linux/arm64\`"
          } >> "$GITHUB_STEP_SUMMARY"
