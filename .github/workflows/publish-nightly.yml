name: Nightly - Build and Publish

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  resolve_ref:
    name: Resolve Nightly Ref
    runs-on: ubuntu-latest

    outputs:
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: develop

      - name: Record Resolved Commit
        id: resolve
        run: |
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  backend-tests:
    name: Backend Tests
    needs: [resolve_ref]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve_ref.outputs.commit_sha }}

      - name: Set Up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Execute Backend Tests
        id: backend_tests
        working-directory: ./booklore-api
        run: |
          echo "Running backend tests..."
          ./gradlew test --no-daemon --parallel --build-cache
        continue-on-error: true

      - name: Publish Backend Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        if: always()
        with:
          files: booklore-api/build/test-results/**/*.xml
          check_name: Backend Test Results

      - name: Upload Backend Test Reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: backend-test-reports
          path: |
            booklore-api/build/reports/tests/
            booklore-api/build/test-results/
          retention-days: 30

      - name: Validate Backend Test Results
        if: steps.backend_tests.outcome == 'failure'
        run: |
          echo "❌ Backend tests failed"
          exit 1

  frontend-tests:
    name: Frontend Tests
    needs: [resolve_ref]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve_ref.outputs.commit_sha }}

      - name: Set Up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: booklore-ui/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./booklore-ui
        run: npm ci

      - name: Audit Frontend Dependencies
        working-directory: ./booklore-ui
        run: npm audit --audit-level=high

      - name: Validate Dependency Tree
        working-directory: ./booklore-ui
        run: npm ls --depth=0

      - name: Execute Frontend Tests
        id: frontend_tests
        working-directory: ./booklore-ui
        run: |
          echo "Running frontend tests..."
          npx ng test
        continue-on-error: true

      - name: Publish Frontend Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        if: always()
        with:
          files: booklore-ui/test-results/vitest-results.xml
          check_name: Frontend Test Results

      - name: Upload Frontend Test Reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: frontend-test-reports
          path: |
            booklore-ui/test-results/vitest-results.xml
          retention-days: 30

      - name: Validate Frontend Test Results
        if: steps.frontend_tests.outcome == 'failure'
        run: |
          echo "❌ Frontend tests failed"
          exit 1

  build-and-push:
    name: Build and Push Nightly Image
    needs: [resolve_ref, backend-tests, frontend-tests]
    if: needs.backend-tests.result == 'success' && needs.frontend-tests.result == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve_ref.outputs.commit_sha }}

      - name: Generate Nightly Tag
        run: |
          short_sha=$(git rev-parse --short HEAD)
          build_date=$(date -u +%Y%m%d)
          nightly_tag="nightly-${build_date}-${short_sha}"
          echo "nightly_tag=$nightly_tag" >> "$GITHUB_ENV"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "Nightly tag: $nightly_tag"

      - name: Set Up QEMU for Multi-Arch Builds
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Authenticate to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            grimmory/grimmory:${{ env.nightly_tag }}
            grimmory/grimmory:nightly
            ghcr.io/grimmory-tools/grimmory:${{ env.nightly_tag }}
            ghcr.io/grimmory-tools/grimmory:nightly
          build-args: |
            APP_VERSION=${{ env.nightly_tag }}
            APP_REVISION=${{ env.commit_sha }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/grimmory-tools/grimmory:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/grimmory-tools/grimmory:buildcache,mode=max
