name: Performance
description: Report a performance issue or propose a performance improvement for Grimmory
labels: ["needs-triage"]
type: Performance
body:
  - type: markdown
    attributes:
      value: |
        Use this template for slow queries, sluggish UI flows, expensive background jobs, memory pressure, high CPU usage, or build/runtime performance issues.

  - type: textarea
    id: summary
    attributes:
      label: What's slow or inefficient?
      description: Describe the performance problem or the area you want to improve
      placeholder: "Example: Opening the library view takes 8 to 10 seconds after adding a few thousand books"
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: What's the impact?
      description: Explain how this affects users, operators, or contributors
      placeholder: "Example: The page blocks long enough that it feels broken and makes browsing large libraries frustrating"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: How can we observe or reproduce it?
      description: Share steps, data volume, timings, or scenarios that expose the problem
      placeholder: |
        Example:
        1. Import a library with 5,000+ books
        2. Open the library view
        3. Measure the time until the list becomes interactive
        4. Repeat on refresh
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Measurements or Evidence (Optional)
      description: Share logs, timings, profiler output, screenshots, or benchmarks if you have them

  - type: textarea
    id: ideas
    attributes:
      label: Ideas or suspected causes (Optional)
      description: If you have a theory or improvement direction, add it here

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Before Submitting
      description: Please confirm you've completed this step
      options:
        - label: I've searched existing issues and confirmed this performance issue hasn't been filed yet
          required: true
