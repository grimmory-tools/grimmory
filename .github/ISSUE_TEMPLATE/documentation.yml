name: Documentation
description: Suggest a documentation fix or improvement for Grimmory
labels: ["needs-triage"]
type: Documentation
body:
  - type: markdown
    attributes:
      value: |
        Use this template for documentation fixes, missing guides, confusing setup steps, or requests to improve the written docs around Grimmory.

  - type: textarea
    id: problem
    attributes:
      label: What documentation needs attention?
      description: Describe what is wrong, missing, outdated, or confusing
      placeholder: "Example: The release guide does not explain how stable image publishing is triggered after semantic-release creates the tag"
    validations:
      required: true

  - type: textarea
    id: location
    attributes:
      label: Where did you run into this? (Optional)
      description: Link the doc, page, file, or workflow area if you know it
      placeholder: "Example: docs/MAKING-A-RELEASE.md or the README quick-start section"

  - type: textarea
    id: improvement
    attributes:
      label: What would improve it?
      description: Describe the missing information, correction, or reorganization that would help
      placeholder: "Example: Add a short step-by-step release flow and note which workflow publishes the images"
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Anything else? (Optional)
      description: Add screenshots, examples, or related links if they help explain the issue

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Before Submitting
      description: Please confirm you've completed this step
      options:
        - label: I've searched existing issues and confirmed this documentation request hasn't been filed yet
          required: true
