# Development compose for testing local (unreleased) PDFium4j and epub4j changes inside Grimmory.
#
# Prerequisite: PDFium4j and epub4j-grimmory repos must be sibling folders of grimmory/:
#   some-folder/
#     grimmory/          - this repo
#     PDFium4j/          - local PDFium4j checkout
#     epub4j-grimmory/   - local epub4j fork checkout
#
# Usage (from grimmory root):
#   docker compose -f dev.local-libs.docker-compose.yml up --build
#
# What it does:
#   1. Publishes PDFium4j and epub4j-grimmory to a shared mavenLocal inside the container
#   2. Starts Grimmory with -PuseLocalLibs so it picks up those local artifacts
#      instead of the versions from Maven Central
#
# To rebuild after changing PDFium4j or epub4j:
#   docker compose -f dev.local-libs.docker-compose.yml up --build
#
# Memory budget (~10 GB total, safe on a 16+ GB host):
#   backend: 6 GB (three sequential Gradle builds, each capped at 2 GB heap)
#   backend_db: 512 MB
#   ui: 1.5 GB (yarn install + Angular CLI)

services:
  backend:
    build:
      context: .
      dockerfile_inline: |
        FROM linuxserver/unrar:7.1.10 AS unrar-layer
        FROM gradle:9.3.1-jdk25-alpine
        RUN apk add --no-cache libstdc++ libgcc
        COPY --from=unrar-layer /usr/bin/unrar-alpine /usr/local/bin/unrar
    command: >
      sh -c "
        case \"$(uname -m)\" in
          x86_64|amd64) PDFIUM_PLATFORM=linux-musl-x64 ;;
          aarch64|arm64) PDFIUM_PLATFORM=linux-musl-arm64 ;;
          *) echo 'Unsupported architecture' >&2; exit 1 ;;
        esac &&
        echo '=== Publishing PDFium4j to mavenLocal ===' &&
        cd /pdfium4j && ./gradlew publishToMavenLocal -x test -x check --no-daemon --max-workers=2 -PpdfiumPlatformFilter=$PDFIUM_PLATFORM &&
        echo '=== Publishing epub4j to mavenLocal ===' &&
        cd /epub4j && ./gradlew publishToMavenLocal -x test -x check --no-daemon --max-workers=2 &&
        echo '=== Starting Grimmory with local libs ===' &&
        cd /booklore-api && ./gradlew bootRun -PuseLocalLibs --no-daemon --max-workers=2
      "
    ports:
      - "${BACKEND_PORT:-6060}:6060"
      - "127.0.0.1:${REMOTE_DEBUG_PORT:-5005}:5005"
    environment:
      - DATABASE_URL=jdbc:mariadb://backend_db:3306/grimmory
      - DATABASE_USERNAME=grimmory
      - DATABASE_PASSWORD=grimmory
      - REMOTE_DEBUG_ENABLED=true
      - ALLOWED_ORIGINS=http://localhost:4200
      # Cap each Gradle JVM to 2 GB heap and limit metaspace
      - GRADLE_OPTS=-Xmx2g -XX:MaxMetaspaceSize=384m
    stdin_open: true
    tty: true
    mem_limit: 6g
    restart: unless-stopped
    depends_on:
      - backend_db
    volumes:
      # Grimmory backend source
      - './booklore-api:/booklore-api'
      - /booklore-api/build
      - /booklore-api/.gradle
      - ./shared/data:/app/data
      - ./shared/books:/books
      - ./shared/bookdrop:/bookdrop
      # Sibling library sources
      - '../PDFium4j:/pdfium4j'
      - /pdfium4j/.gradle
      - /pdfium4j/build
      - '../epub4j-grimmory:/epub4j'
      - /epub4j/.gradle
      - /epub4j/build
      # Shared mavenLocal across all three builds
      - maven_local:/root/.m2/repository

  backend_db:
    image: mariadb:11.4
    container_name: backend_db_locallibs
    volumes:
      - backend_db_locallibs:/var/lib/mysql
    restart: unless-stopped
    mem_limit: 512m
    environment:
      - MYSQL_ROOT_PASSWORD=grimmory
      - MYSQL_DATABASE=grimmory
      - MYSQL_USER=grimmory
      - MYSQL_PASSWORD=grimmory
    ports:
      - "${DB_PORT:-3366}:3306"
    healthcheck:
      test: [ "CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-pgrimmory" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    image: node:24-alpine
    command: sh -c "cd /angular-app && corepack enable && corepack yarn install --immutable && corepack yarn ng serve --host 0.0.0.0 --watch --configuration development"
    environment:
      - NODE_ENV=development
      - NODE_OPTIONS=--max-old-space-size=1024
    stdin_open: true
    tty: true
    mem_limit: 1536m
    restart: unless-stopped
    volumes:
      - './frontend:/angular-app'
    ports:
      - "${FRONTEND_PORT:-4200}:4200"

volumes:
  maven_local:
  backend_db_locallibs:
