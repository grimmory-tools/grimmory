{{- if and .Values.mariadb.enabled .Values.externalDatabase.host }}
{{- fail "mariadb.enabled and externalDatabase are mutually exclusive: disable the bundled MariaDB subchart or remove the externalDatabase" }}
{{- end }}
{{- if and (not .Values.mariadb.enabled) (not .Values.externalDatabase.host) }}
{{- fail "At least one database must be set" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grimmory.fullname" . }}
  labels:
    {{- include "grimmory.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "grimmory.selectorLabels" . | nindent 6 }}
  template:
    {{- $dbHost := "" }}
    {{- $dbPort := 0 }}
    {{- $dbName := "" }}
    {{- $dbUserName := "" }}
    {{- $dbPasswordSecretName := "" }}
    {{- $dbPasswordSecretKey := "" }}
    {{- if .Values.mariadb.enabled }}
    {{- $dbHost = printf "%s-mariadb" .Release.Name  }}
    {{- $dbPort = .Values.mariadb.service.port }}
    {{- $dbName = .Values.mariadb.auth.database }}
    {{- $dbUserName = .Values.mariadb.auth.username }}
    {{- if .Values.mariadb.auth.existingSecret }}
    {{- $dbPasswordSecretName = .Values.mariadb.auth.existingSecret }}
    {{- $dbPasswordSecretKey = required "mariadb.auth.secretKeys.userPasswordKey is required when using an existing secret for MariaDB" .Values.mariadb.auth.secretKeys.userPasswordKey }}
    {{- else }}
    {{- $dbPasswordSecretName = printf "%s-mariadb" .Release.Name }}
    {{- $dbPasswordSecretKey = "mariadb-password" }}
    {{- end }}
    {{- else }}
    {{- with .Values.externalDatabase }}
    {{- $dbHost = required "externalDatabase.host is required" .host }}
    {{- $dbPort = .port | default 3306 }}
    {{- $dbName = required "externalDatabase.database is required" .database }}
    {{- $dbUserName = required "externalDatabase.username is required" .username }}
    {{- $dbPasswordSecretName = required "externalDatabase.existingSecret is required" .existingSecret }}
    {{- $dbPasswordSecretKey = required "externalDatabase.existingSecretPasswordKey is required" .existingSecretPasswordKey }}
    {{- end }}
    {{- end }}
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "grimmory.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "grimmory.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-database
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for database at {{ $dbHost }} port {{ $dbPort }}..."
              until nc -z -v -w5 '{{ $dbHost }}' {{ $dbPort }}; do
                echo "Waiting for database..."
                sleep 2
              done
              echo "Database is available!"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              #protocol: TCP
          env:
            - name: DATABASE_URL
              value: {{ printf "jdbc:mariadb://%s:%v/%s" $dbHost $dbPort $dbName | quote }}
            - name: DATABASE_USERNAME
              value: {{ $dbUserName | quote }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $dbPasswordSecretName | quote }}
                  key: {{ $dbPasswordSecretKey | quote }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if (or .Values.persistence.dataVolume.enabled .Values.persistence.booksVolume.enabled .Values.extraVolumeMounts) }}
          volumeMounts:
            {{- if .Values.persistence.dataVolume.enabled }}
            - name: data
              mountPath: /app/data
            {{- end }}
            {{- if .Values.persistence.booksVolume.enabled }}
            - name: books
              mountPath: /books
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if (or .Values.persistence.dataVolume.enabled .Values.persistence.booksVolume.enabled .Values.extraVolumes) }}
      volumes:
        {{- if .Values.persistence.dataVolume.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ if .Values.persistence.dataVolume.existingClaim }}
              {{- .Values.persistence.dataVolume.existingClaim }}
            {{ else }}
              {{- include "grimmory.fullname" . }}-data
            {{- end }}
        {{- end }}
        {{- if .Values.persistence.booksVolume.enabled }}
        - name: books
          persistentVolumeClaim:
            claimName: {{ if .Values.persistence.booksVolume.existingClaim }}
              {{- .Values.persistence.booksVolume.existingClaim }}
            {{ else }}
              {{- include "grimmory.fullname" . }}-books
            {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end -}}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
