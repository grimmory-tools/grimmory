<ng-container *transloco="let t; prefix: 'settingsView.dashboardScrollers'">
  <div class="settings-card">
    <div class="section-header">
      <h3 class="section-title">
        <i class="pi pi-sliders-h"></i>
        {{ t('sectionTitle') }}
      </h3>
      <p class="section-description">
        {{ t('sectionDesc') }}
      </p>
    </div>

    <div class="section-body">
      <div class="scrollers-container">
        @for (scroller of config.scrollers; track scroller.id; let i = $index) {
          <div class="scroller-item">
            <div class="scroller-content">
              <div class="scroller-controls-left">
                <p-checkbox [(ngModel)]="scroller.enabled" [binary]="true"></p-checkbox>
              </div>

              <div class="scroller-fields">
                <div class="scroller-field" [class.expanded]="scroller.type !== ScrollerType.MAGIC_SHELF">
                  <label [for]="'dashboard-scroller-type-' + scroller.id">{{ t('type') }}</label>
                  <p-select
                    fluid
                    [inputId]="'dashboard-scroller-type-' + scroller.id"
                    [options]="availableScrollerTypes()"
                    [(ngModel)]="scroller.type"
                    (onChange)="onScrollerTypeChange(scroller)"
                    [placeholder]="t('selectType')"
                    appendTo="body">
                  </p-select>
                </div>

                @if (scroller.type === ScrollerType.MAGIC_SHELF) {
                  <div class="scroller-field">
                    <label [for]="'dashboard-scroller-magic-shelf-' + scroller.id">{{ t('magicShelf') }}</label>
                    <p-select
                      fluid
                      [inputId]="'dashboard-scroller-magic-shelf-' + scroller.id"
                      [options]="magicShelves()"
                      [(ngModel)]="scroller.magicShelfId"
                      [placeholder]="t('selectMagicShelf')"
                      appendTo="body">
                    </p-select>
                  </div>

                  <div class="scroller-field">
                    <label [for]="'dashboard-scroller-sort-field-' + scroller.id">{{ t('sortField') }}</label>
                    <p-select
                      fluid
                      [inputId]="'dashboard-scroller-sort-field-' + scroller.id"
                      [options]="sortFieldOptions()"
                      [(ngModel)]="scroller.sortField"
                      [placeholder]="t('selectField')"
                      appendTo="body">
                    </p-select>
                  </div>

                  <div class="scroller-field">
                    <label [for]="'dashboard-scroller-sort-direction-' + scroller.id">{{ t('direction') }}</label>
                    <p-select
                      fluid
                      [inputId]="'dashboard-scroller-sort-direction-' + scroller.id"
                      [options]="sortDirectionOptions()"
                      [(ngModel)]="scroller.sortDirection"
                      [placeholder]="t('selectDirection')"
                      appendTo="body">
                    </p-select>
                  </div>
                }
              </div>

              <div class="scroller-field max-items-field">
                <label [for]="'dashboard-scroller-max-items-' + scroller.id">{{ t('maxItems') }}</label>
                <p-inputNumber
                  fluid
                  [inputId]="'dashboard-scroller-max-items-' + scroller.id"
                  [(ngModel)]="scroller.maxItems"
                  [min]="MIN_ITEMS"
                  [max]="MAX_ITEMS"
                  [showButtons]="true">
                </p-inputNumber>
              </div>

              <div class="scroller-controls-right">
                <p-button
                  icon="pi pi-arrow-up"
                  outlined
                  rounded
                  severity="info"
                  size="small"
                  [disabled]="i === 0"
                  (click)="moveUp(i)">
                </p-button>
                <p-button
                  icon="pi pi-arrow-down"
                  outlined
                  rounded
                  severity="info"
                  size="small"
                  [disabled]="i === config.scrollers.length - 1"
                  (click)="moveDown(i)">
                </p-button>
                <p-button
                  icon="pi pi-trash"
                  outlined
                  rounded
                  size="small"
                  severity="danger"
                  (click)="removeScroller(i)"
                  [disabled]="config.scrollers.length === 1">
                </p-button>
              </div>
            </div>
          </div>
        }
      </div>

      <div class="setting-actions">
        <div class="actions-left">
          <p-button
            [label]="t('addScroller')"
            icon="pi pi-plus"
            severity="primary"
            outlined
            size="small"
            (click)="addScroller()"
            [disabled]="config.scrollers.length >= MAX_SCROLLERS">
          </p-button>
          <p-button
            [label]="t('resetToDefault')"
            icon="pi pi-refresh"
            severity="secondary"
            text
            size="small"
            (click)="resetToDefault()">
          </p-button>
        </div>
        <p-button
          [label]="t('saveSettings')"
          icon="pi pi-save"
          outlined
          severity="success"
          (click)="save()">
        </p-button>
      </div>
    </div>
  </div>
</ng-container>
